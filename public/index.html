<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador de Orçamento Pessoal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f4f8;
    }
    .container {
      background: white;
      padding: 2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 480px;
    }
    h1 { color: #2d3748; margin-bottom: 0.5rem; }
    p  { color: #718096; font-size: 1rem; }
    kbd {
      background: #edf2f7;
      border: 1px solid #cbd5e0;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💰 Orçamento Pessoal</h1>
    <p>O simulador será iniciado automaticamente via <strong>prompt</strong>.</p>
    <p>Abra o Console (<kbd>F12</kbd> → aba <kbd>Console</kbd>) para ver os resultados detalhados.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
